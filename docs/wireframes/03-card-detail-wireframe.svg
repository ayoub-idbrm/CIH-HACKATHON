  <text x="1113" y="369" font-family="Arial, sans-serif" font-size="14" fill="#64748b">Category</text>
  <rect x="550" y="405" width="720" height="46" rx="9" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="862" y="434" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1e3a8a">Record Spend</text>

  <rect x="520" y="540" width="380" height="260" rx="14" fill="#f8fafc" stroke="#64748b"/>
  <text x="542" y="574" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Catalog of Consumption</text>
