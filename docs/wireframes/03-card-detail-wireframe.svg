  <text x="346" y="597" font-family="Arial, sans-serif" font-size="14" fill="#991b1b">Withdraw</text>

  <rect x="520" y="280" width="780" height="240" rx="14" fill="#f8fafc" stroke="#64748b"/>
  <text x="545" y="316" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Spend Form</text>
