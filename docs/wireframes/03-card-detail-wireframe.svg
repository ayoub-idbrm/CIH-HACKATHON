  <text x="565" y="634" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Chronological transaction list</text>
  <text x="565" y="662" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Type badge + amount + description</text>
  <text x="565" y="690" font-family="Arial, sans-serif" font-size="14" fill="#334155">• Reset history action</text>

  <rect x="920" y="540" width="380" height="260" rx="14" fill="#f8fafc" stroke="#64748b"/>
  <text x="942" y="574" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Consumption by Category</text>
