  <text x="60" y="108" font-family="Arial, sans-serif" font-size="18" fill="#334155">Goal: Execute money operations and inspect transaction analytics from one focused screen.</text>

  <rect x="70" y="150" width="1260" height="680" rx="20" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>

  <rect x="100" y="180" width="1200" height="70" rx="12" fill="#f1f5f9" stroke="#64748b"/>
